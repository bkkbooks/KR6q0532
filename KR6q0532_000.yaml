front:
  text: 嘉興府闔郡鄉紳諸大護法請啓伏以少室開天濬靈源於奕世嶽林飛錫弘寶緒於千秋名藍允藉偉人起敝尤須古德恭惟臨濟正宗主峰大和尚滹沱杰出淮泗流芳幼通黃石佩神劍於王珣夙契玄機接宗風於臨濟洵祗林之龍象允緇素之爐錘默等歸依素切瞻禮恆殷痛大道之猶迷冀法筵之再振吾郡龍淵禪窟係歷來諸祖道場但以往來兵衝蕩為瓦礫三花樹下空繫嗚駝立雪亭前頓生蕪草屢伸悃於龍天護展靈於像季茲遇宗工聳秀因知道法將興大衆歡呼天神鼓舞雖殘廢堪嗟然主持攸賴所冀無趣古佛之里傳化久長更值金明老人之庭咫尺相近故敢投誠此日實祈垂手斯時伏祈威力驅魔秉金剛王之寶劍婆心度世吐大慈父之神光將見檇李城西鴻闡斷橋宗旨鴛鴦湖畔重恢濟北津梁用是同聲公請伏望一鉢飛來臨楮曷任翹企之至法末談貞默曹溶張晉徵吳鑄汪挺張天植范周莊鏻朱茂時許宗渾錢江何元英
