body:
  text: 侍者覺海録師於癸卯二月十二日本郡紳襟諸大護法暨本山耆宿恭迎入院師至山門云龍淵勝境八字打開當軒者誰喝一喝便入佛殿巍巍堂堂煒煒煌煌因甚麼灰頭土面滿口含霜遂插香云大似十字街頭石敢當伽藍挽傾墜之風整殘廢之席大家出隻手扶起破沙盆祖師石灰布袋到處遺迹不肖捉敗口橫鼻直據室獨坐當軒全提正令饒他氣吞佛祖眼蓋乾坤卓拄杖云到這裡也須乞命即日諸大護法設齋請上堂師拈疏云大衆見麼這個從靈山付囑歷劫不忘拈出則泉石光輝展開則珠璣燦爛如未徹者更煩維那宣過宣畢師以杖指座云諸佛列祖當仁不讓今日水到渠成一句合作麼生拽杖便升座拈香云此一瓣香世出世間最尊最貴爇向爐中端為祝延今上皇帝聖躬萬歲萬萬歲惟願堯天永祚壽同劫石之堅固舜日長明福等彌盧之寬大次拈香云此一瓣香根承佛植枝茂王庭奉為滿朝文武現任宰官紳襟居士諸大護法伏願為雨為霖永作衛法之金湯為祥為瑞恆作擎天之柱石復拈香云此一瓣香類之不齊撥之不散高標獨露唯證乃知今日人天衆前第二回拈出供養前住武康天池現住本郡金明堂上傳臨濟正宗三十一世上介下菴本師大和尚用酬法乳之恩斂衣就座晦巖和尚白椎云法筵龍象衆當觀第一義師揮拂子云若論第一義把住也黃金失色放行也瓦礫爭光今日斬新條令別一乾坤正恁麼時還有同聲相應者不妨請出相見有麼有麼如無看取新長老展演去也乃云事來隨應無偏黨事去渾忘不立知興替有時君莫計失便宜處落便宜某乃野逸慵僧薄福鮮德秪可山林泉石藏拙畢生蓋有未了公案不無驅馳業纍混迹塵緣既承諸大護法以龍淵廢席見招某觀之實有感傷只得勉力忍受以待將來今日復蒙恭迎入院上堂愧無奇言妙句出格玄談一種平懷家常語話若作佛法商量兔馬有角不作佛法商量牛羊無角設有個漢出來道不得顢頇大衆好新長老向他道你早自顢頇了也若作這般見解他後設有把茆蓋頂近山沒柴燒傍河沒水喫換手捶胸定有日在不若向這裡隨緣作務趁時打徹一朝露柱點頭燈籠發笑未以為然正好向十字街頭金沙地上拾馬郎糞作檀香薰開佛祖鼻孔豈不慶快新長老今日恁麼舉揚衆中還有恁麼人麼良久遂以拂擊几云妙舞謾應誇偏好三臺須是大家摧謝辭不録復結椎云諦觀法王法法王法如是卓拄杖下座當晚小參師云大凡整叢林立宗旨莫不由此時節因緣時節若至如貧得寶山僧今日在糞掃堆頭拖犁拽把珠回玉轉動地驚天然雖總是已分中事也要各各自肯始得不見古德云大家相聚喫莖虀喚作莖虀入地獄如箭大衆既不喚作莖虀畢竟喚作甚麼師良久遂以杖卓一卓云但願東風齊著力一時吹入我門來珍重因井無水師禱井泉云龍神龍神嚇嚇威靈有水我住無水我行祝畢次朝半井甘泉足可供衆挂鐘板師指鐘板云佛祖紀綱叢林律令揭示當陽內外悉應驀舉槌云試看今朝權在手遂擊一下云有誰不聽令施行因事上堂普説示衆與夫道德不難於説而難於行時事不難乎應而難乎守若行持不篤操守不恆縱説得亂墜天花親承佛祖於自他分中有何益耶豫自濫膺以來未敢逸懈是應力行非應即改不因難易移其志逆順異其初似乎今日偷安利己為幸烏知他年公無摘欺之謂歟且龍淵一席緣起於五季宋時神迹凜然誠關一郡風水寺居孔道住持事繁陸路通衢吳越要津明季龍淵勝境嘉禾第一名剎如吳虎丘越之西湖自變應以來兵馬驛夫遞相踐擾混毀是故荒蕪不堪僧衆流散致名藍竟作馬廄之場日炙風吹狼藉猶甚每見雲水飢渴載道客舟夜泊嗟吁投宿無門由是見聞情慘起豫慨應公請先且從自打破慳食急令匠工起爐作灶次辦什物等件修理寮舍開墾園林墻築完備然後進院開廚入門便能作主今日叢席已整龍象雲臻尚有個事未敢囊藏不無舉似師驀拈拄杖卓一卓云者個滯貨山僧一向冷眼今日拈來重新光彩大衆且道喚什麼作個事莫不是拈棒豎拂見色明心鳴鐘擂鼓聞聲悟道若恁麼見解盲聾人來作麼會入不然喫飯穿衣處迎賓待客處行住坐臥處語默離微處若恁麼現前卻又是恁麼魔叫你割恩捨愛披剃出家是什麼魔令你磨肩擦褲涉水登山是什麼魔賺你虛生浪死不顧本命元辰你還知麼要明個事直須猛著精彩急著眼睛始得不然一入殊途早做魔種眷屬沒自由分正謂甜瓜徹蒂甜苦瓜連根苦不信且看釋家老子從兜率降南閻初生動地驚天其間不無手忙腳亂及到末梢頭於無所用心處忽然觸著鼻孔換卻烏珠未免一場漏逗次後達磨西來九年面壁神光立雪斷臂安心三祖覓罪了不可得五祖栽松直待來生六祖得傳衣法由避四會南嶽磨磚打牛即是打車趙州三十年不雜用心除二時粥飯是雜用心長慶坐破七個蒲團捲起簾來見天下雪峰三到投子九上洞山無端掘地覓青天蓋這都是從上入道的樣子今日衆中設有咬得破嚼不碎的漢正好於此隨衆排遣趁水和泥直待因緣時節到來好向東頭買賤西頭賣貴一任翻黃道黑搶行奪市豈不慶快且置大衆今日佛祖各展鎗旗新長老當先還有不惜性命單刀直入者麼設無莫道山僧壓良為賤好卓杖云個中誰是狼牙將敢來張弓射尉遲下座中元文華杜居士薦親請上堂師揮拂僧問古剎重興法門慶幸龍象蹴踏家聲遠震家聲遠震即不問中元救拔事如何師豎拂云全憑渠力進云法王通一線大地盡霑恩師云禮拜有分僧禮退師乃云昔年曾種善根來今日靈苗不用栽莫謂老僧隨例倒須知別有好安排山僧入院數月已來要且無篾束肚何暇説禪今日事不獲已只得逢場作戲然盂蘭緣起當時目連尊者因母惡習墮落尊者入道具大神通設多方便啓白佛慈饒益將來蒙佛敕令不拘僧俗四衆弟子凡遇七月十五自恣日當為七世父母及現在父母危難中者供養飯食百味汲灌盆器香油錠燭敷床臥具盡世甘美以著盆中供養十方大德僧衆乃至過去現世父母六親眷屬得出三途之苦應時解脫此公案古今未曾動著今日不意杜居士以不可思議自在神力掀翻打徹揮金普利撥務投誠虔請山僧舉揚拔薦若非夙植再來曷能如是符契事雖一時會遇實乃千古奇緣今日不獨杜門親屬了悟自性彌阤亦使見聞咸登彼岸大衆且道山僧今日恁麼舉揚還委悉麼遂以拂擊几云世出世間希有事顯發須憑過量人擲拂下座臘月初八監院領衆居士設齋請上堂師拈香畢晦巖和尚白槌云法筵龍象衆當觀第一義懷亭劉居士出問云臘月八日佛證道時和尚高登法座道個甚麼師卓杖云會麼士進云如來證覺底就是這一著麼師云你腳跟未點地在士喝師便打士擬進語師云遲了八刻士禮退師乃云迦老初生伶俐長大忒煞糊塗棄捨皇宮內院走入雪嶺躊蹰六載肝腸餓斷一朝打失眼珠將謂無人證得咄哉誰不丈夫山僧恁麼舉揚衆中還有共相委悉者麼若無且看別行一路去也然溪山雖異雲月皆同法無定相遇緣即應且道如何是同別底意旨昔夾山會禪師京口初開堂有僧問如何是法身山云法身無相如何是法眼山云法眼無瑕座間道吾失笑山便下座請益遂散衆再參船子了明大事復歸聚徒道吾密遣僧如前理問如何是法身山云法身無相如何是法眼山云法眼無瑕其僧舉似道吾吾云者漢這回方徹師云大衆夾山前後語話無別道吾因甚許後不許前且道淆訛在甚麼處試定當看良久以拂擊几云還家盡是兒孫事祖父從來不出門復結槌云諦觀法王法法王法如是下座西堂心宗預祝設齋請上堂師以拄杖橫几云父母未生前露柱懷胎開笑顏㘞地一聲後描也不成畫不就遂卓杖云且道現前又作麼生不涉春秋逞風流座中瀟灑任優遊還有為人句麼生平肝膽向人傾相識猶如不相識擲拄杖下座丁未八月草二日上堂付西堂心宗法語師拈衣拂云龍淵虎穴任縱橫大抵還他氣象雄不是山僧呈醜拙驚人浪裏獲獰龍誠然宗公識見無疑參侍老僧有年縱奪當陽實乃師子緣契今日兩手分付一任倒用橫拈光揚法化毋令斷絶珍重隨付衣拂法偈下座劉正修居士領衆設齋請上堂問答不録乃云擊鼓鳴鐘已是漏逗不少集衆升座那堪矢上加尖若論箇事在諸人分中悉自具足所以先聖云百姓日用而不知故君子之道鮮矣既在日用之間穿衣提領洗面觸鼻從朝至暮頭頭爾法法爾如天普蓋似地普擎見聞覺知何曾有一毫頭假借所謂只此見聞非見聞更無聲色可呈君箇中若了渾無事體用何妨分不分具分也落霞與孤鶩齊飛不分也野水共長天一色到者裏釋迦未降皇宮還有佛法也無達磨不來東土喚他作不為人得麼龍淵今日不惜眉毛已為諸人注破還委悉麼良久擲拂云而今四海明如鏡行人莫與路為讎卓杖下座南門衆居士預祝設齋請上堂師拈香畢問答不録乃云趙州七百二十甲子已過去龍淵三百六十甲子方到來過去到來兩彩一賽娘娘依舊是婆婆生平有甚不慶快山僧住席以來抱貧守拙於人事荒疏慚愧猶甚今值暮景餘年極承衆居士營齋光臨法會然信施難消不妨為成道業大衆起心受食淨名早訶不起於心食作麼受離此二途還有商量也無昔南泉因趙州問如何是道泉曰平常心是道曰還可趣向也無泉曰擬向即乖曰不擬爭知是道泉曰道不屬知不屬不知知是妄覺不知是無記若真達不疑之道猶如太虛廓然蕩豁豈可強是非耶州於言下悟理師云南師口頭水漉漉地到這裡不無拗曲作直趙州得便宜處失便宜未免鈍置一上今日龍淵與麼批判設有傍不甘的出來問如何是道山僧劈脊便棒何故不惟解粘去縛也使他知些痛癢始得且道在山僧一句又作麼生師遂合掌云端坐受供養施主常安樂一日因老和尚顧院到方丈見觀音像問師云是什麼像師答送子觀音祈求必應尚云終日與人祈何不自求一個師云但求的不是子尚云恁麼也須著力師隨撾鼓示衆山僧於斯末後有語未進仰勞大衆著語看若確有柄住山斧子兩手分付如未能且照顧始得師良久云以衆為心賴得人叢林相應始安寧山僧縱有偷天手孤掌從來不浪嗚所以插標建剎庶子一上神通即心即佛馬祖通身泥水衲僧家竿木隨身逢場不妨作戲鉤錐在手遇緣便可即宗適蒙老漢垂勵深知罪咎驀取拂豎云須知鈍貨搶行也要大家委悉山僧恁麼舉揚有伶俐衲僧便和聲放下向者裡來魔佛冤親互相策勵不唧溜漢望岩而退去住三家村裡保頭也做不得一個何故斯事希有世出世間有力者自能擔荷為衆為己過量人便乃承當所以泰山不讓土壤成其大滄海不擇細流故能就其深只要挺身向前慎勿因循退後向無措足處正好行履無下手處不妨提斯設若到恁麼時節方知運首座輔南泉有陷虎之機用都監佐積翠有大碗之作賓維那罰錢甘嗣興化南書記領衆參益慈明楊岐祖燈焰寶壽生薑辣更有佑與座踢淨瓶住持溈山存飯頭去砂米頓悟法忍山釋迦寂直歲插鍬辨主瞌睡虎隆藏主丕振宗風顯知客不輕韓大伯善侍者激發真點胸從上老古錐阿誰不從苦心中來敢言一一成現饒是釋迦老子初生動地驚天大有作略到其間弄得七顛八倒麻麥充暘驀然打失烏珠方契衆生具有如來智慧德相此是古佛應迹因緣更有雲峰悅在大愚芝座下芝一日示衆云大家相聚喫莖虀喚作一莖虀入地獄如箭悅聞之駭然便上方丈請開示芝曰法輪未轉食輪先轉後生家趁此色力健何不為衆乞化我忍飢不暇何暇為汝説禪乎悅不敢違未幾芝遷翠岩悅納疏罷復過翠岩求開示芝曰佛法不怕爛卻今正雪寒可為衆乞炭悅亦奉命化炭歸復到方丈請益芝曰堂司即目缺人今正煩汝悅受之不樂恨芝不去心一日聞後架桶箍忽散自架墮落豁然大悟頓見芝用處不常急趨方丈芝見來笑曰且喜維那大事了畢悅不措一詞禮拜了退這個便是輔弼叢林竭力為衆的樣子今日山僧不惜兩片皮一一為諸人舉似了也大衆還知麼設有孟八郎漢出來道將謂長老有多少奇特及乎拈出者夥老骨董陳年爛葛藤與夫阿誰分中沒些子山僧只得據款結案向他道低聲低聲不可草草何故聻鶴有九皋難翥翅馬無千里慢追風遂搖拂子出堂云咄不得妄通消息秋後再作商量丁未秋因事示衆虛聲灼卜沒來由不是冤家不聚頭堪笑騎驢新婦子阿家牽去也風流今夏有個沒鬚鬍子來參早被山僧捉敗他欲於此興波作浪吐氣揚眉山僧善能就手行拳助伊風色機緣然是相扣乳水要且未投一日索他行履伊一一開具將成九仞猶虧一簣監院見河下水緊人急計生將伊敗闕揭露山僧令他進見問今日事如何伊答兩眼對兩眼山僧云切莫詐明頭監院云我已白明和尚了山僧問今日還有你躲跟處麼伊隨禮拜云和尚慈悲山僧震威一喝伊慚色禮出裝促行云再來親近和尚據監院言伊同智輩開堂付嗣有年假扮親近欲和尚付伊法席住三年覓一人代嗣和尚方去山僧笑謂何為不可因甚龍頭蛇尾大衆者漢如後婚婆子羞也不識今日若是不知痛癢漢棒折也未肯放過何故龍生鳳子從來有鳳育龍兒亙古無師誕日同門及諸大護法居士設齋請上堂古燈和尚白椎拈香畢休嚴法姪出問法筵龍象衆觀光已足如來壽量品專為流通師云燈籠露柱笑呵呵進云不作人不作境如何舉似師云早已舉似了也進云天雨四花地搖六震某甲敢不上壽師云讚歎有分進云雲外天香月中桂子師云猶成多事進云不妨錦上鋪花師云須是恁麼人始得公便禮拜師乃云金風飄桂蕊玉露透天香全示西來意何更念篇章余本樗才秪堪煨折腳鐺子承蒙諸大護法見召寄寓龍淵五易寒暑今值病朽生緣之日復蒙光降設齋請升此座只得因齋慶讚不免舉則舊案應箇時節昔陸亙大夫謂南泉曰肇法師也甚奇怪解道天地與我同根萬物與我一體南泉遂指庭前牡丹花曰時人見此一株花如夢相似師云大夫舉話勾賊破家南泉指花就窠打劫秪是一枝花發付不著今日設問龍淵只向他道春色無高下花枝有短長但恁麼去就不獨氣轉陽回亦可光輝門戶良久顧衆笑云座中盡是江南客何必尊前唱鷓鴣謝辭不録卓杖下座八月初四日菩薩開光恆修暨董寄凡沈君亮陸君錫請上堂師拈香畢維那白椎竟問龍淵一滴波揚四海大衆臨筵願聞法要師云已為道過了也進云彌勒把住袋口呵呵大笑韋天持杵感應三洲因甚又要他者一點師云不較多進云恁麼則桂添玉露香穿鼻金風滿院奪秋魁師云許你讚歎有分禮退問福緣成就古佛增輝人天眼目無不具足因甚又土上加泥師云也不妨疑著進云個中自有撑船手那個男兒不丈夫師云識得你了也進云處處緑楊堪繫馬家家有路透長安師云且款款的進云莫嫌世上無仙客須信壺中別有天師云將謂多少奇特僧喝師云惡發作麼禮退問闡揚法要慧日高懸覿面相逢請師一鑑師云已相見了進云今日檀信開光且道無事衲僧承誰恩力師云問取舌頭進云昔日世尊今朝和尚師云你甚處見得僧便喝師云好一喝進云與麼則一音普遍於沙界大衆無不盡咸聞師云且禮拜了退師乃云他人不住我正住別人欲行我未行不是山僧多倔僵一番拈起一番新山僧自癸卯春承闔郡諸大護法公請龍淵主席自愧薄福無為人事荒疏外缺街坊內無支應灰頭垢面已七年也今日於沒思惟處突出幾個沒情面漢以不可思議自在神力打開無盡藏運出自己珍任運騰騰自由自在與山門有幸作大饒益今日菩薩開光設齋聚衆公請山僧上堂要應個時節大衆且道時節作麼應師良久云菩薩來也驀豎拂子云在山僧拂子頭上放光現瑞大轉法輪向汝等道豁開頂𩕳摩醯眼山自青兮水自緑覿面分明絶覆藏畫蛇不用重添足復舉潭州長髭曠禪師初參石頭頭曰甚麼處來髭曰嶺南來頭曰大庾嶺頭有一鋪功德成就也未髭曰成就久矣只欠點眼頭曰莫要點眼麼髭曰便請頭垂下一足髭見便禮拜頭曰見甚麼道理便禮拜髭曰某甲見處如紅爐上一點雪師云你看石頭老漢大似節外生枝無風起浪長髭也是承虛接響頭入膠盆龍淵今日又且不然待石頭恁麼便云和尚尊重無勞動靜且看老漢如何合殺今日賓主歷然則不無和合一句作麼生道卓拄杖一下云塵中能作主化外自來賓復結椎下座庚戌春上浣日上堂付書記崛山山才跨門師豎拂山禮拜師揮拂云從上佛祖盡在山僧拂子頭上大轉法輪成等正覺汝還見麼進云二十九年放過今朝則不然師云不信道山遂奪拂便揮行云揮天揮地去也師笑云今日且放過一頓隨付衣拂源流乃云夙承雨露天生俊徹底風流頗偉哉原豫克家真種草今朝自肯乃歸來復禮下座為素弘兄設供師云山僧於柏山和尚同條其貫法門手足本該親詣因院事羈絆不克如願敬具菲儀身雲法侄設供披宣猶某誠切之至所至文明老法昌兄呼弟應正相當而今四海明如日超出聲光北斗藏惟我柏山法兄素弘大和尚因成果熟觸處飄香宿契再來全承願力未踏祖翁田地先投原本契書才入蠡水長洪便乃興波作浪可謂琉璃拶破無多子記莂擔當顯大材揭地掀天恢古道光前耀後絶安排所以善知識越生死海濟渡彼岸處熱鬧場撒手便行即今塔從地湧頂自雲封且道還有奇特事也無良