外馳求衆答云迷人不識好歹求和尚慈悲師隨示語云慈悲即不無迷悟即不得不無不得處是名觀自在勞生碌碌樂其中失業拋家少用工不信真如向外覓卻來者裏禮圓通還會麼會得覿面觀音不會白雲萬里卓拄杖云還要見觀音麼將錢買胡餅放下是個饅頭衆作禮僧簷放歇序桌師問那裏行腳來僧答靈隱師云近日籌子不洗來者裏納甚敗闕僧慚色放擔作禮師云既在諸方行腳也要照顧始得一日師在齋堂前見大鬍子云者個是僧是俗答云和尚不得分別他師云是你分別是老僧分別僧走云今日不著便師云著便堪作甚麼僧無語師少間在路擒住云道道看僧答老禪識得個事便休師云喚甚麼是個事僧答某甲昔在萬如老和尚處後到靈隱數年今隨本師送佛眉西堂兄進院失候造次師云敗闕不少僧參師問甚麼處來僧答靈岩師云來覓甚麼碗僧答和尚不得壓良為賤師云只恐不是玉僧答請師雕琢師云不值半文錢僧喝師打僧又喝師復打僧禮拜師云不信道僧參師問那裏來答蘇州師云甚處過冬僧答堯峰師問蘇州堯峰相隔幾許僧答三九師云猶涉途程僧問和尚如何是不涉途程師云腳跟下薦取僧答某甲不然師云放你一頓且安單去師一日見新客問話客師洗手師云多洗多不淨不洗到清淨僧答某甲要洗洗師云爭怪得老僧其僧無語師問衆梵維那答者僧落塹救他不得師遂休一日錯鐘板巡寮師問畢竟怎麼是不錯僧答失照師云那裡去來僧答只在堂中師云又道失照顧僧遂禮退僧參師問那邊過夏僧答特來禮拜和尚師云將得甚麼來僧答某甲只如此和尚又如何師云恁麼忘前失後且去洗腳莫教打濕鼻孔僧笑行師云不枉特來僧參師問從甚麼處來僧答金粟過夏特來訪友師云莫是主上座麼僧答不是師云是即是覿面錯過了僧喝師打云好生無禮僧又喝師連棒云恁麼無禮僧走向衆言果是惡辣師笑云直教你認得他一僧直走竟不回互師云好個阿師僧聽得復回禮拜師云又來之繞作麼僧答某甲罪過師云卻是失錢遭罪僧云莫奪他好師云又恁麼去也僧答聞和尚慈悲師云猶欠伶俐僧參師豎拳云會麼僧喝師云者一喝未有主在僧又喝師云三喝四喝有甚交涉僧擬喝師打云放過即不可僧禮出一日衆出坡搬柴師云整的堆上樓亂的隨手燒一僧云總是燒鍋師云又恁麼去也僧云和尚今日化的多師云也不得辜負他煎些豆腐好撑飯袋子僧云我們明日多化些師云也少不得你一頓僧參師問何處發足僧答楊墳師云船來走來僧答二途俱不涉師云脫空漢這裡沒你立腳處僧答某甲亦不住師云甚麼處去僧答向萬里無雲處師云看腳下僧喝師便打僧答莫錯打人好師云還我不錯底來僧擬進語師云還記得話頭麼僧禮退僧擺行師以杖約住問云向這裡道將一句來僧喝師便打僧又喝師復打云一喝分賓主如何是主僧擬喝師云立地死漢僧禮求懺師云你自起倒僧托鍋巴走師云粒米如山不可狼藉僧答不狼藉師云狼藉處你不知僧進堂復來禮拜師云又來覓什麼汁傍僧云何不禮謝和尚師云你也要一杓那僧答不干某甲事師云著甚死急僧參師云沒鬚鬍子何來僧答蘇州往杭師云向這裡覓甚碗僧答和尚又恁麼會也師云適言蘇州到杭州僧答學人借路經過師打云借你吃棒僧笑禮拜師云且放你一頓僧參師云從那裡來僧答金粟師云將得金來麼僧答特來呈舊面師云不識羞僧喝師便打僧進云眼目在什麼處師復打云向者裡知些痛癢始得僧禮拜云某甲知恩師云不信道齋堂前見數僧師問都從那裡行腳來衆答托鉢師云既托鉢又來這裡覓甚碗衆答特來吃飯師云叢林飯似山擬向什麼處下口衆答一飽便休師云飽即不無作麼休去衆無語師云喫了飯托鉢休僧參禮拜未起師云向禮拜前道一句看僧喝師打僧又喝師復打僧答和尚不得壓良為賤師云爭怪得老僧雪朗參師問從那邊來答福嚴師云向親近那個和尚答三峰會下各處住住師問那是你得力處答不識師云既諸方走為甚麼到者裏不識答不識不識師云恁麼擔板漢也朗禮拜出次日安侍寮師旦過堂結齋畢問朗侍者那位是你師傳朗指文璽云者一位師云正恁麼時還有你跺跟處麼璽答跺跟久矣師云為甚麼偷心璽答不會師云賴汝不會璽便拜師一日問既是龍淵為甚麼不見興波作浪山泓答換卻嘉禾一郡人眼睛若鑑答幾人親到龍淵慈林答貴圖此話大行默朗答罕遇知音潛夫再參才拜師喝問喚者個作甚麼答一任和尚師云不得就老僧借口答恁麼普天匝地去也師曰猶跳不出圈繢在夫便禮出百峰問春城無處不飛花為什麼龍淵不見一枝開師答你眼瞎峰云秖有老梅冰鐵幹卻無多子在人間師鳴指云你還會麼峰擬答師便掌峰禮退興善禮鴛祖塔祖風閩浙已輝煌殃纍渠儂北斗藏常帶角毛高著眼橫拖泥水力承當韜光顯迹真堪辣蜜用潛行冷似霜後代兒孫沒伎倆晨昏瞻禮一爐香步掃菴談護法韻朅來應現宰官身果見金湯法苑春早展經綸為柱石茲因記莂作梁津渾然瀟灑林間志覷破浮遊世外塵笑把毫端揮未盡名藍孰不仰洪釣寄樗菴法侄淮海波寬寄瘦骸長洪鴛水接塵埃衝風破浪推收放把住推開任往來三塔點頭爭笑傲十方把臂讚奇哉深垂綸釣忘年月獲個金鱗始稱懷送別牧山法兄從來拄杖逞神通何意分襟七夕中煙水波光權作餞禾城秋色送行蹤晴開氣爽雲空闊霧鎖山青花潤紅此去湖南仍不隔由來千里自同風和素穎法兄韻數年慚愧勉支撑鮮不逢仁解困英幸有同風相委悉等間拈出作金聲和形外大師韻把袂分襟各一方欣逢雪夜敘長年千華上座雷音震法雨均霑大地田自愧凍儂無伎倆龍淵蛙步敢當先今朝何幸光殘臘笑待春風話席前約菴施居士六秩益新猶振舊家風海屋籌添量莫窮一任淡寧無欲纍男兒到此是豪雄牧公項護法五秩妙契無生旨安祥慶大椿舊閣間田地拈來猶更新超卓世間法和光且利塵籌添盈海屋南極詠長庚蓮齋周居士六秩耳順圓音也大奇心空端的是男兒從來一任渾瀟灑不似長年夢裡癡仰泉劉居士九秩偈耄年安樂體蘭桂彩衣斑方外無他視須彌作壽山因事偶筆春濃何事出煙籠秖為生平跟界空不是東君開鈍置幾乎鹵調別商宮初秋梧葉才傾地輕飄舞袖裳波澄紅夢色露滴緑荷香老樹蟬鳴翠新蘿蝶夢長夜來風雨後一覺到天光和仙居晦岩法兄韻蕭寺孤撑煙水中滿襟幽趣倩誰同高歌半為溪聲發長嘯時因鶴語通尚憶壯懷如舊日懶將瘦杖倚秋風偏宜共逐東山侶笑摘芙蓉對碧空和翠峰斐公法弟韻幾經叢菊鬥芳菲薄倩煙霞久護闈笑踏溪邊鷗作伴間敲竹外月流輝峰高翠斂千尋遠松老虯蟠百尺威頑石點頭知有日海天誰不讓先機和先福別傳法弟韻病骨難同去日闕敢將衰朽較諸方夢回短榻稍扶倦秋老殘燈半藉光傍竹幽憐風舞翠倚松淡惜月浮蒼秖堪隱作溪邊侶不計山高共水長酬子先羅居士韻一杖支離整舊壇頻翻歌笑竟忘難鐘間鶴夢三更月笛引龍吟午夜伴老巖冰作骨凌秋溪調雪成團林邊慚愧龍山叟時折藤花當客餐酬牧公項護法韻湖光潦倒不知年月散芙蓉後孤松隻鶴一聲懸次崇寧魯巖法侄韻獨露丹衷較日紅可堪末法濟流中驚瀾欲砥誰為柱大廈將頽爾續宗自笑撑門逢暮歲強來拈棒趁秋風幾莖瘦骨雖無賴一傲猶欺石上松次柏山升雲法侄韻倚松伴鶴到如今幾度風前聽好音柏子吹香千里外彩雲疊疊繞丹岑次繡雪休岩法侄韻生平競業似臨淵骨傲寒梅凍後堅釣月無心間坐石鋤雲有意淡分煙不堪木食餐幽侶漫話瓊芝茹野仙共踏秋光鴛水畔幾回歌笑欲忘年答大悲心宗主人韻騰踏秋光任縱橫當陽一句讓誰爭分條藤作新來杖結箇茅為倚去帡法際三秋慚我老道原千古在人宏卻憐白髮偷安日賴爾殷勤護作嬰次淮陰子昌張居士韻悠遊老去久忘機杖子山形屋角巍千里知音遺彩筆百年泉石自增輝繫懷歲暮黃花發眺首晴空紅葉飛漫道江湖襟帶隔秋風明月共依依和蓮齋周居士韻鳹聲曉度碧湖前淡蕩秋光倩孰傳屋角空憐藤杖老強來扶作地行仙次玄度陸居士韻隻杖頻年倚舊壇家風欲話倍多難擬從暮歲歸青嶂敢向深淵砥碧瀾桂老一枝秋影瘦月明千里素輪圓懶殘芋子重拈出笑向君前進午餐答綸趙居士韻探隱逐時來相逢碧眼開竹邊看水月松外聽風雷我借蘿為屋君還玉作垓鍾期知己在不老釣魚臺答金明監院心月韻一枝遙寄託龍淵幾度金風竹外傳羡爾心同秋月皎萬里流輝碧滿天答梵為維那韻老我風霜一杖堅尋鷗幾度繞湖前錦囊羡爾攜來句白雪流輝散滿筵答潤生禪師韻老去風光逼古稀陪鷗溪外笑忘機吹來郢上清新調一點陽春遍舞輝答天目禪師韻披襟間對碧湖清隔水時聽欸乃聲幽夢幾回追野鶴秋光一半老禾城鬢毛此日憐吾白頭角他年羡爾嶸石上片雲欹歲暮分籌慚傍海天宏答文石禪師韻霜到籬邊秀紫英林風湖月闕雙清山僧甲子渾忘卻藜杖慚分太乙庚答湛如孫韻眠雲夢不到人間老我悠然分外間傍水朝同鷗散去穿林暮逐鶴飛還骨堅未肯輸梅瘦鬢短猶堪笑竹斑輕步偏從秋後健每思掀踏隔湖山和天封蜜蜂頌五和其一突出尋芳奮力時翻天覆地豈思歸驀然透得些兒意喜氣揚揚帶笑飛頭角生成便作涯紛紜縱奪未離衙自從胡亂相安後末上風流始作家抖擻雄心拶出時飛來飛去不曾離釀成一種無他味壯體寬腸且益脾昂藏出入逞風光奮採花香心更忙紫陌叢中施辣手大方獨步敢承當了然無事入空桐動靜掀翻徹底通更惜茫然一等漢輕輕拶著面緋紅二和自小精明解活時破家蕩業意忘歸個中落處知音少按下雲頭款款飛瞻風撥草作生涯歷過諸方總納衙不是一番勤苦後至今那得永傳家末法垂秋奮起時行藏豈肯墮窠離驀然收盡花潘巧雖成造次潤心脾門庭孤潔足風光不比尋常逐隊忙春暖雪消花爛熳天時人事及相當靈鷲曾拈示此桐若能自肯乃方通等間放出撩天鼻鼓舞塵寰大地紅三和萬紫千紅開發時上林春奪一枝歸泥團打破成狼藉個個銜恩翼翼飛才然動著遍天涯檢點將來卻在衙個裏分明無住著不知春色落誰家林下紛然須趁時風流傑出沒支離就中若了渾無事落得舒懷且養脾地久天長賴此光參詳誰不為伊忙埋頭深院無人識略露鋒鋩孰敢當逸林解放樂疏桐贏得身間手眼通且應隨緣消歲月風飄香襲落花紅四和春深晝永出林時紫陌紛紛恰又歸只為主人情義重想因不忍去來飛白拈慣作好生涯作略超方悉任衙大地行來無寸土阿誰不羡舊聲家隱出須知各有時貴乎操守慢支離未經霜雪難同味資口徒將不暢脾春日融和氣質光紛芳鼓舞為誰忙己躬大事若能了觸處無情孰抵當收拾紛華且隱桐白雲深處有誰通把茅休歇鐺支早榾柮無情火焰紅五和欲舞靈峰莫待時直須恰意乃方歸入門堂奧無多子起落分明便任飛尋芳林表樂無涯照用齊行趁晚衙縱奪掀翻渾不住天然到處便為家揚眉吐氣發輝時任運飛騰絶即離個裏豈從天地得成家安頓快心脾崢嶸遊戲好風光踏著花心不用忙操守將來成事業者回儘力要擔當透出威音劫外桐光風霽月悉融通知音猶笑間家具露柱燈籠徹底紅
